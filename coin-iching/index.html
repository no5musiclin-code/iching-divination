let lines = [];
let tossing = false;

function tossCoin() {
  if (tossing) return;
  tossing = true;
  const btn = document.getElementById('coinBtn');
  btn.classList.add('tossing');
  btn.disabled = true;

  setTimeout(() => {
    btn.classList.remove('tossing');
    // 3 coins: 3 heads (3) = 7 (old yang), 2 heads+1 tail (2) = 6 (old yin), etc.
    // For simplicity: count heads (yang)
    const h = Math.floor(Math.random() * 2) + Math.floor(Math.random() * 2) + Math.floor(Math.random() * 2);
    // h=3 -> yang (7), h=2 -> yin (8), h=1 -> yin (8), h=0 -> yang (7)
    const lineValue = (h >= 2) ? 7 : 8; // 7=yang/☰, 8=yin/☷
    const isYang = lineValue === 7;
    const symbol = isYang ? '☰' : '☷';
    const coinFace = h >= 2 ? '☰' : '☷';

    lines.push(lineValue);

    // Show coin result
    const history = document.getElementById('coinHistory');
    const div = document.createElement('div');
    div.className = 'coin-result';
    div.textContent = coinFace;
    div.style.animation = 'flipCard 0.4s ease';
    history.appendChild(div);

    updateHexagram();
    tossing = false;

    if (lines.length < 6) {
      btn.disabled = false;
      document.getElementById('progressText').textContent = `Line ${lines.length}/6 — Toss again!`;
    } else {
      document.getElementById('progressText').textContent = 'Reading complete!';
      btn.disabled = true;
      showResult();
    }
  }, 600);
}

function getHexagramNumber(yaoValues) {
  // Lower trigram (lines 1-3 from bottom) and upper trigram (lines 4-6 from bottom)
  // yaoValues[0] = line 1 (bottom), yaoValues[5] = line 6 (top)
  const lower = yaoValues.slice(0, 3);
  const upper = yaoValues.slice(3, 6);

  // Map to trigram numbers: Kun(8)=0, Gen(8)=1,坎(6)=2,巽(8)=3,震(4)=4,乾(7)=5,離(3)=6,坤(2)=7,兌(2)=8
  // Simple mapping based on binary representation
  function trigramValue(lines) {
    // yang=7 -> 1, yin=8 -> 0
    const bits = lines.map(l => l === 7 ? 1 : 0);
    // bottom line is bits[0], top is bits[2]
    return bits[0] * 4 + bits[1] * 2 + bits[2];
  }

  const lv = trigramValue(lower);
  const uv = trigramValue(upper);
  // King Wen sequence
  const seq = [
    [1,2,3,4,5,6,7,8], // trigram order: heaven, lake, fire, thunder, wind, water, mountain, earth
  ];

  // King Wen sequence: 1=Qian(1),2=Kun(2),3=Zhun(3),4=Meng(4),5=Xu(5),6=Song(6),7=Shi(8),8=Bi(9),
  // 9=Xiaoxu(26),10=Lv(10),11=Tai(11),12=Pi(12),13=Tongren(30),14=Dayu(14),15=Qian(15),16=Yu(16),
  // 17=Sui(10),18=Gu(26),19=Lin(19),20=Guan(20),21=Shike(21),22=Bi(22),23=Bo(23),24=Fu(24),
  // 25=Wuwang(52),26=Daxu(41),27=Yi(27),28=Daguo(28),29=Kan(29),30=Li(30),31=Xian(53),32=Heng(32),
  // 33=Dun(33),34=Dazhuang(34),35=Jin(35),36=Mingyi(36),37=Jiaren(37),38=Kui(38),39=Jian(39),40=Xie(40),
  // 41=Sun(41),42=Yi(42),43=Guai(43),44=Gou(44),45=Cui(45),46=Sheng(46),47=Kun(47),48=Jing(48),
  // 49=Ge(49),50=Ding(50),51=Zhen(51),52=Gen(52),53=Jian(53),54=Guimei(54),55=Feng(55),56=Lv(56),
  // 57=Xun(57),58=Dui(58),59=Huan(59),60=Jie(60),61=Zhongfu(61),62=Xiaoguo(62),63=Jiji(63),64=Weiji(64)

  // Simplified: use binary mapping for hexagram
  const hexValue = lower.reduce((s, l, i) => s + (l === 7 ? 1 : 0) * Math.pow(2, i), 0) +
                   upper.reduce((s, l, i) => s + (l === 7 ? 1 : 0) * Math.pow(2, i + 3), 0);

  // Hexagram number = position in King Wen sequence based on hexagram structure
  // We'll use a lookup-free approach: map structure to number
  // Lower trigram (0-7) + Upper trigram (0-7)*8 = 0-63
  // Map to King Wen order 1-64
  const kingWenOrder = [
    1,34,5,26,11,9,14,43,  // 0-7
    25,36,19,46,13,37,44,28,  // 8-15
    21,51,3,27,42,24,22,41,  // 16-23
    58,20,63,48,57,18,32,50,  // 24-31
    54,40,38,55,61,60,53,62,  // 32-39
    39,52,16,35,45,12,15,47,  // 40-47
    6,33,31,56,4,29,7,2  // 48-55... actually let me use direct
  ];

  // Use the actual King Wen arrangement
  const kw = [
    [1,43,14,34,9,26,11,5],   // Heaven (1) upper
    [44,2,23,8,20,16,35,12],  // Lake (2) upper
    [13,49,30,55,37,36,22,51], // Fire (3) upper
    [33,31,39,52,56,19,49,38], // Thunder (4) upper
    [25,53,37,57,61,60,41,42], // Wind (5) upper
    [6,29,4,40,7,59,47,48],   // Water (6) upper
    [26,22,18,27,23,24,2,8],   // Mountain (7) upper
    [10,58,5,32,28,45,12,20]   // Earth (8) upper
  ];

  // Wait, the mapping is: lower*8 + upper
  // But trigrams in binary: Qian=111=7, Dui=011=3, Li=101=5, Zhen=001=1, Xun=110=6, Kan=010=2, Gen=100=4, Kun=000=0
  const trigramMap = {7:0, 3:1, 5:2, 1:3, 6:4, 2:5, 4:6, 8:7}; // value -> index
  const lowerIdx = trigramMap[lower.reduce((s,l) => s+l, 0)] || 0;
  const upperIdx = trigramMap[upper.reduce((s,l) => s+l, 0)] || 0;

  const actualKw = [
    [1,34,5,26,11,9,14,43],
    [44,2,23,8,20,16,35,12],
    [13,49,30,55,37,36,22,51],
    [33,31,39,52,56,19,49,38],
    [25,53,37,57,61,60,41,42],
    [6,29,4,40,7,59,47,48],
    [26,22,18,27,23,24,2,8],
    [10,58,5,32,28,45,12,20]
  ];

  return actualKw[upperIdx][lowerIdx];
}

function updateHexagram() {
  if (lines.length === 0) return;
  const display = document.getElementById('hexagramDisplay');
  display.style.display = 'flex';

  // Show lines from bottom to top
  let html = '';
  for (let i = 0; i < 6; i++) {
    const line = i < lines.length ? (lines[i] === 7 ? '☰' : '☷') : '　';
    const label = ['初爻','二爻','三爻','四爻','五爻','上爻'][i];
    html += `<div class="yao-column"><span class="yao line-result">${line}</span><span class="yao-label">${label}</span></div>`;
  }
  display.innerHTML = html;
}

function showResult() {
  const num = getHexagramNumber(lines);
  const hex = ICHING[num];
  if (!hex) { console.error('Hexagram not found:', num); return; }

  const question = document.getElementById('question').value.trim();
  const narrative = question
    ? `Your question: "${question}" has been answered by Hexagram ${num} — ${hex.aka}.`
    : `Hexagram ${num} — ${hex.aka} has revealed itself for you.`;

  document.getElementById('hexName').textContent = hex.name;
  document.getElementById('hexAKA').textContent = hex.aka;
  document.getElementById('hexJudgement').textContent = hex.judgement;
  document.getElementById('hexImage').textContent = hex.image;
  document.getElementById('narrative').textContent = narrative;
  document.getElementById('resultSection').style.display = 'block';
  document.getElementById('coinBtn').style.display = 'none';
}

function resetCoin() {
  lines = [];
  document.getElementById('coinHistory').innerHTML = '';
  document.getElementById('hexagramDisplay').style.display = 'none';
  document.getElementById('resultSection').style.display = 'none';
  document.getElementById('coinBtn').style.display = '';
  document.getElementById('coinBtn').disabled = false;
  document.getElementById('progressText').textContent = 'Click the coin to begin your 6-line reading';
}
