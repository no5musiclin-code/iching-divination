<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>免費下載｜7天 AI 收入挑戰</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #0a0a1a 0%, #1a1a3a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: #fff;
        }
        .container {
            max-width: 600px;
            width: 100%;
        }
        .card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 24px;
            padding: 48px 40px;
            backdrop-filter: blur(10px);
            text-align: center;
        }
        .badge {
            display: inline-block;
            background: rgba(100, 180, 255, 0.15);
            border: 1px solid rgba(100, 180, 255, 0.3);
            color: #7dd3fc;
            padding: 6px 16px;
            border-radius: 50px;
            font-size: 14px;
            margin-bottom: 24px;
            letter-spacing: 1px;
        }
        h1 {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 16px;
            line-height: 1.3;
        }
        .subtitle {
            color: rgba(255,255,255,0.6);
            font-size: 18px;
            margin-bottom: 32px;
            line-height: 1.6;
        }
        .cover-img {
            width: 100%;
            max-width: 400px;
            border-radius: 16px;
            margin: 24px auto;
            display: block;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }
        .features {
            text-align: left;
            background: rgba(255,255,255,0.03);
            border-radius: 16px;
            padding: 24px 28px;
            margin: 28px 0;
        }
        .features h3 {
            font-size: 16px;
            color: rgba(255,255,255,0.8);
            margin-bottom: 16px;
        }
        .feature-item {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
            font-size: 15px;
            color: rgba(255,255,255,0.75);
        }
        .feature-item:last-child { margin-bottom: 0; }
        .feature-item span { font-size: 20px; }
        .form-section {
            margin-top: 32px;
        }
        .form-group {
            margin-bottom: 16px;
        }
        input[type="email"] {
            width: 100%;
            padding: 16px 20px;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 12px;
            background: rgba(255,255,255,0.05);
            color: #fff;
            font-size: 16px;
            outline: none;
            transition: border-color 0.3s;
        }
        input[type="email"]:focus {
            border-color: #7dd3fc;
        }
        input[type="email"]::placeholder {
            color: rgba(255,255,255,0.3);
        }
        .btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #3b82f6, #6366f1);
            border: none;
            border-radius: 12px;
            color: #fff;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(59, 130, 246, 0.4);
        }
        .privacy {
            font-size: 13px;
            color: rgba(255,255,255,0.35);
            margin-top: 16px;
        }
        .social-proof {
            margin-top: 32px;
            padding-top: 24px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }
        .proof-text {
            font-size: 14px;
            color: rgba(255,255,255,0.5);
            font-style: italic;
        }
        .emoji-row {
            font-size: 28px;
            margin-bottom: 12px;
        }
        @media (max-width: 480px) {
            .card { padding: 32px 24px; }
            h1 { font-size: 26px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="badge">🎁 免費資源</div>
            <h1>🎯 7天 AI 收入挑戰</h1>
            <p class="subtitle">用 AI 在 7 天內啟動你的線上收入。100% 免費工具，零成本開始。</p>

            <!-- 封面圖 -->
            <img src="lead_magnet_cover.png" alt="7天AI收入挑戰封面" class="cover-img" onerror="this.style.display='none'">

            <div class="features">
                <h3>📋 挑戰包含什麼？</h3>
                <div class="feature-item"><span>📅</span> 7 天詳細行動任務（每天 1-2 小時）</div>
                <div class="feature-item"><span>💬</span> 50+ 個 AI 提示詞（拿來即用）</div>
                <div class="feature-item"><span>📧</span> 5 封 Email 歡迎序列模板</div>
                <div class="feature-item"><span>🛠️</span> 免費工具完整清單與使用指南</div>
                <div class="feature-item"><span>💰</span> 聯盟行銷變現路線圖</div>
            </div>

            <div class="form-section">
                <!-- 替換 action 為你的 Email 行銷工具 URL -->
                <form action="#" method="POST" id="lead-form">
                    <div class="form-group">
                        <input type="email" name="email" placeholder="輸入你的 Email，馬上收到挑戰內容 @" required>
                    </div>
                    <button type="submit" class="btn">🚀 立即免費下載</button>
                </form>
                <p class="privacy">🔒 我們重視你的隱私。不會發送垃圾郵件。</p>
            </div>

            <div class="social-proof">
                <div class="emoji-row">⭐⭐⭐⭐⭐</div>
                <p class="proof-text">「這個挑戰讓我從『想賺錢』變成『真的開始做』。第一天就發布了第一篇文章。」<br>— 讀者迴響</p>
            </div>
        </div>
    </div>
</body>
</html>
