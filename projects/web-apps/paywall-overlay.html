<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>付費解鎖系統</title>
<style>
.paywall-overlay {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(10,10,20,0.97);
  z-index: 9999;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: "Noto Sans TC", sans-serif;
}
.paywall-box {
  background: linear-gradient(135deg, #1a1a2e, #16213e);
  border: 1px solid rgba(167,139,250,0.4);
  border-radius: 20px;
  padding: 2.5rem;
  max-width: 480px;
  width: 90%;
  text-align: center;
}
.paywall-box h2 {
  font-size: 1.5rem;
  color: #e2e8f0;
  margin-bottom: 0.75rem;
}
.paywall-box p {
  color: #94a3b8;
  font-size: 0.95rem;
  line-height: 1.7;
  margin-bottom: 1.5rem;
}
.paywall-features {
  background: rgba(255,255,255,0.04);
  border-radius: 12px;
  padding: 1.25rem;
  margin-bottom: 1.5rem;
  text-align: left;
}
.paywall-features h3 {
  color: #a78bfa;
  font-size: 0.9rem;
  margin-bottom: 0.75rem;
}
.paywall-features li {
  color: #94a3b8;
  font-size: 0.88rem;
  padding: 0.35rem 0;
  padding-left: 1.2rem;
  position: relative;
  list-style: none;
}
.paywall-features li::before {
  content: "✓";
  position: absolute;
  left: 0;
  color: #4ade80;
  font-size: 0.75rem;
  top: 0.4rem;
}
.paywall-price {
  font-size: 2.2rem;
  font-weight: 700;
  color: #a78bfa;
  margin-bottom: 0.25rem;
}
.paywall-price span {
  font-size: 1rem;
  color: #64748b;
  text-decoration: line-through;
  margin-left: 0.5rem;
}
.paywall-note {
  color: #64748b;
  font-size: 0.8rem;
  margin-bottom: 1.5rem;
}
.paywall-btn {
  background: linear-gradient(135deg, #a78bfa, #7c3aed);
  color: #fff;
  padding: 0.9rem 2rem;
  border-radius: 30px;
  font-weight: 700;
  font-size: 1rem;
  text-decoration: none;
  display: inline-block;
  transition: transform 0.2s, box-shadow 0.2s;
}
.paywall-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 25px rgba(167,139,250,0.4);
}
.paywall-free {
  color: #64748b;
  font-size: 0.82rem;
  margin-top: 1rem;
}
.paywall-free a {
  color: #a78bfa;
  text-decoration: none;
}
</style>
</head>
<body>

<div class="paywall-overlay" id="paywall">
  <div class="paywall-box">
    <h2>🔓 解鎖完整功能</h2>
    <p>你正在使用免費版。升級解鎖所有進階功能，發揮這個工具的最大價值。</p>

    <div class="paywall-features">
      <h3>✨ 完整版包含</h3>
      <ul>
        <li>不受限制的分析次數</li>
        <li>完整的歷史記錄儲存</li>
        <li>PDF 報告下載功能</li>
        <li>無廣告干擾</li>
        <li>優先使用新功能</li>
      </ul>
    </div>

    <div class="paywall-price">$5 <span>$25</span></div>
    <p class="paywall-note">一次付款，永久使用。持續更新版本。</p>

    <a href="https://ko-fi.com/s/00367ecd74" class="paywall-btn">🚀 立刻解鎖完整版</a>

    <p class="paywall-free">
      還在猶豫？<br>
      <a href="https://ko-fi.com/s/00367ecd74">看看完整套組包含的所有內容 →</a>
    </p>
  </div>
</div>

</body>
</html>
